spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

spring.application.name=WeatherDataFetcher
app.s3.bucket-name=${RAW_BUCKET:weather-raw}
app.kafka.output-topic=weather.actual.raw.created
app.kafka.input-topic=weather.need_info
app.s3.endpoint=${S3_ENDPOINT_URL:http://minio:9000}
app.s3.access-key=${AWS_ACCESS_KEY_ID:minioadmin}
app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:minioadmin}
app.external-api-url=http://historical-se26.bxkr.org/api/avg-temperature
server.port=5050

spring.kafka.consumer.group-id=weather-data-fetcher
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.max.poll.interval.ms=600000

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.project.weatherdatafetcher.dto,com.project.weatherdatafetcher.model,java.util
spring.kafka.consumer.properties.spring.json.value.default.type=com.project.weatherdatafetcher.dto.InputEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false


spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual_immediate