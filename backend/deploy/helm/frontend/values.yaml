# Install as: helm upgrade --install frontend . -n dm-pipeline
# Image is built from frontend/Dockerfile (repo root, not backend/microservices).

image:
  repository: cr.yandex/crpmc4ksa9bqvd59g3dm/dm-pipeline/frontend-image
  tag: "latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

ingress:
  enabled: true
  host: "se26.bxkr.org"
  # ID сертификата в Yandex Certificate Manager — заполнить после выпуска
  # (managed Let's Encrypt, DNS-challenge, тот же процесс, что для front-api).
  certificateId: ""
  # Дедицированная группа — НЕ "example" (чужие живые проекты) и НЕ
  # "front-api" (уже существующий ALB; добавление нового host в него
  # прогоняет тот же update/merge код-путь gwin, который уже дважды был
  # источником проблем). Новая группа = новый ALB с нуля, без merge.
  groupName: "frontend"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
