apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "airflow.fullname" . }}-metadata-postgres
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.metadataPostgres.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.metadataPostgres.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airflow.fullname" . }}-metadata-postgres
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: metadata-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "airflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: metadata-postgres
  template:
    metadata:
      labels:
        {{- include "airflow.labels" . | nindent 8 }}
        app.kubernetes.io/component: metadata-postgres
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: "{{ .Values.metadataPostgres.image.repository }}:{{ .Values.metadataPostgres.image.tag }}"
          env:
            - name: POSTGRES_DB
              value: {{ .Values.metadataPostgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.metadataPostgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.metadataPostgres.password | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.metadataPostgres.user }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.metadataPostgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "airflow.fullname" . }}-metadata-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "airflow.fullname" . }}-metadata-postgres
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    {{- include "airflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: metadata-postgres
