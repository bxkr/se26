apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airflow.fullname" . }}
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: airflow
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "airflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: airflow
  template:
    metadata:
      labels:
        {{- include "airflow.labels" . | nindent 8 }}
        app.kubernetes.io/component: airflow
    spec:
      enableServiceLinks: false
      containers:
        - name: airflow
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "airflow.fullname" . }}
            # S3_ENDPOINT_URL/RAW_BUCKET/AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY —
            # created directly by Terraform (yandex-cloud-sample/terraform/stage-1/
            # object_storage.tf), referenced by name so the key material never
            # passes through `helm upgrade --set`/values.yaml.
            - secretRef:
                name: {{ .Values.s3.secretName }}
          env:
            # Airflow's REST API defaults to session-only auth; dm_trigger
            # calls it with HTTP Basic Auth, which is silently rejected
            # (403, not 401) unless basic_auth is enabled here too.
            - name: AIRFLOW__API__AUTH_BACKENDS
              value: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
            # dm_pipeline has no schedule (external-trigger only), but a
            # freshly-parsed DAG is paused by default and won't run tasks
            # even when dm_trigger POSTs a dagRun — only new DAGs are
            # affected, doesn't unpause one a human paused on purpose.
            - name: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
              value: "False"
            - name: CLICKHOUSE_HOST
              value: {{ .Values.clickhouse.host | quote }}
            - name: CLICKHOUSE_HTTP_PORT
              value: {{ .Values.clickhouse.httpPort | quote }}
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.db | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.user | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "airflow.fullname" . }}
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    {{- include "airflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: airflow
