apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "analytics-api.fullname" . }}
  labels:
    {{- include "analytics-api.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "analytics-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "analytics-api.labels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      containers:
        - name: analytics-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "analytics-api.fullname" . }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_TOPICS
              value: {{ .Values.kafka.topics | quote }}
            - name: KAFKA_GROUP_ID
              value: {{ .Values.kafka.groupId | quote }}
            - name: CLICKHOUSE_HOST
              value: {{ .Values.clickhouse.host | quote }}
            - name: CLICKHOUSE_HTTP_PORT
              value: {{ .Values.clickhouse.httpPort | quote }}
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.db | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.user | quote }}
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REGIONS_API_URL
              value: {{ .Values.regionsApi.url | quote }}
            - name: ANALYTICS_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.requestTimeoutSeconds | quote }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "analytics-api.fullname" . }}
  labels:
    {{- include "analytics-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
  selector:
    {{- include "analytics-api.selectorLabels" . | nindent 4 }}
