apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "regions-api.fullname" . }}
  labels:
    {{- include "regions-api.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "regions-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "regions-api.labels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      containers:
        - name: regions-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "regions-api.fullname" . }}
  labels:
    {{- include "regions-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
  selector:
    {{- include "regions-api.selectorLabels" . | nindent 4 }}
