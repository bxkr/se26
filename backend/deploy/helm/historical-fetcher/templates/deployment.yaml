apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "historical-fetcher.fullname" . }}
  labels:
    {{- include "historical-fetcher.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "historical-fetcher.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "historical-fetcher.labels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      containers:
        - name: historical-fetcher
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.s3.secretName }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
          ports:
            - name: http
              containerPort: 5050
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "historical-fetcher.fullname" . }}
  labels:
    {{- include "historical-fetcher.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5050
      targetPort: http
  selector:
    {{- include "historical-fetcher.selectorLabels" . | nindent 4 }}
