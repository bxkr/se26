# Install as: helm upgrade --install postgres . -n dm-pipeline
# Stand-in for the operational DB etl_service writes to (weather_actual) —
# same schema as backend/infra/postgres/init.sql, same default credentials
# as backend/docker-compose.yml, so pointing dm_pipeline at a real
# etl_service-managed Postgres later is a values-only change.

image:
  repository: postgres
  tag: "16"
  pullPolicy: IfNotPresent

auth:
  db: weather
  user: weather
  password: weather

nameOverride: ""
fullnameOverride: ""

persistence:
  size: 2Gi
  storageClassName: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi
