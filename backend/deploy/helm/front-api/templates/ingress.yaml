{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "front-api.fullname" . }}
  labels:
    {{- include "front-api.labels" . | nindent 4 }}
  annotations:
    gwin.yandex.cloud/externalIPv4Address: auto
    gwin.yandex.cloud/groupName: {{ .Values.ingress.groupName | quote }}
    # OPTIONS is required — browsers send a CORS preflight OPTIONS request
    # before cross-origin POST/PATCH/DELETE with a JSON body, and the ALB
    # itself (not just the backend) enforces this allowlist: without OPTIONS
    # here, gwin returns a 404 straight from the load balancer before the
    # request ever reaches front_api's CORSMiddleware.
    gwin.yandex.cloud/rules.allowedMethods: GET,POST,PUT,PATCH,DELETE,OPTIONS
spec:
  ingressClassName: gwin-default
  {{- if .Values.ingress.certificateId }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: yc-certmgr-cert-id-{{ .Values.ingress.certificateId }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "front-api.fullname" . }}
                port:
                  number: 8000
{{- end }}
