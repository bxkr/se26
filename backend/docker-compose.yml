services:
  postgres:
    image: postgres:16
    container_name: se26-postgres
    environment:
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: se26-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/usr/bin/kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: se26-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: se26-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: se26-clickhouse
    environment:
      CLICKHOUSE_DB: weather
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: weather
    ports:
      - "8123:8123"
      - "9100:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  regions_api:
    build:
      context: ./microservices/regions_api
      dockerfile: Dockerfile
    container_name: se26-regions-api
    ports:
      - "8001:8000"
    restart: unless-stopped

  analytics_api:
    build:
      context: ./microservices/analytics_api
      dockerfile: Dockerfile
    container_name: se26-analytics-api
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      regions_api:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPICS: weather.dm.ready,weather.pipeline.failed
      KAFKA_GROUP_ID: analytics-api

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_DB: weather
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: weather

      REGIONS_API_URL: http://regions_api:8000
      ANALYTICS_REQUEST_TIMEOUT_SECONDS: "600"
    ports:
      - "8002:8000"
    restart: unless-stopped

  front_api:
    build:
      context: ./microservices/front_api
      dockerfile: Dockerfile
    container_name: se26-front-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics_api:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      ANALYTICS_API_URL: http://analytics_api:8000

      FRONT_API_JWT_SECRET: dev-only-local-compose-secret
      FRONT_API_ACCESS_TOKEN_TTL_SECONDS: "900"
      FRONT_API_REFRESH_TOKEN_TTL_SECONDS: "1209600"
      FRONT_API_CACHE_TTL_SECONDS: "300"
      FRONT_API_CORS_ORIGINS: http://localhost:3000
      FRONT_API_COOKIE_SECURE: "false"
      FRONT_API_DEMO_USERNAME: demo
      FRONT_API_DEMO_PASSWORD: demo12345
    ports:
      - "8003:8000"
    restart: unless-stopped

  historical_fetcher:
    build:
      context: ./microservices/historical_fetcher
      dockerfile: Dockerfile
    container_name: se26-historical-fetcher
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      regions_api:
        condition: service_started
    environment:
      REGIONS_API_URL: http://regions_api:8000
    ports:
      - "5050:5050"
    restart: unless-stopped

  test_producer:
    build:
      context: ./tools/test_producer
      dockerfile: Dockerfile
    container_name: se26-test-producer
    depends_on:
      kafka:
        condition: service_started
      minio:
        condition: service_started
      historical_fetcher:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REQUEST_TOPIC: weather.need_info
      RAW_CREATED_TOPIC: weather.actual.raw.created

      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      RAW_BUCKET: weather-raw

      TEST_SOURCE_NAME: historical_fetcher

      REQUEST_SOURCE_NAME: test_producer
      EXPECTED_RAW_SOURCE_NAME: historical_fetcher
      EXPECTED_ROW_COUNT: "6"
      EXPECTED_OBJECT_KEYS_COUNT: "3"

      REQUEST_DATE_FROM: "1960-01-01"
      REQUEST_DATE_TO: "1960-01-03"
      REQUEST_STATIONS_JSON: >
        '["20674", "20891"]'
    profiles:
      - test
    restart: "no"

volumes:
  postgres_data:
  minio_data:
  clickhouse_data: