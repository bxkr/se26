services:
  postgres:
    image: postgres:16
    container_name: se26-postgres
    environment:
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: se26-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/usr/bin/kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: se26-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  historical_fetcher:
    build:
      context: ./microservices/historical_fetcher
      dockerfile: Dockerfile
    container_name: se26-historical-fetcher
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "5050:5050"
    restart: unless-stopped

  test_producer:
    build:
      context: ./tools/test_producer
      dockerfile: Dockerfile
    container_name: se26-test-producer
    depends_on:
      kafka:
        condition: service_started
      minio:
        condition: service_started
      historical_fetcher:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REQUEST_TOPIC: weather.need_info
      RAW_CREATED_TOPIC: weather.actual.raw.created

      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      RAW_BUCKET: weather-raw

      TEST_SOURCE_NAME: historical_fetcher

      REQUEST_SOURCE_NAME: test_producer
      EXPECTED_RAW_SOURCE_NAME: historical_fetcher
      TEST_SCHEMA_VERSION: "1"
      EXPECTED_ROW_COUNT: "6"
      EXPECTED_OBJECT_KEYS_COUNT: "3"

      REQUEST_DATE_FROM: "1960-01-01"
      REQUEST_DATE_TO: "1960-01-03"
      REQUEST_STATIONS_JSON: >
        '["20674", "20891"]'
    profiles:
      - test
    restart: "no"

volumes:
  postgres_data:
  minio_data: