server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Cache-bust-friendly hashed asset filenames (Vite) can be cached hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # react-router-dom client-side routing: any unknown path falls back to
    # index.html instead of a raw nginx 404, so deep links (/dashboard, /admin/...)
    # work on direct load/refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
